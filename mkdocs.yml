site_name: Polar — Документация
site_description: Визуальный интерпретируемый язык программирования
site_url: https://polar-lang.dev
repo_url: https://github.com/user/polar
edit_uri: edit/main/docs/

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Начало работы: guide/getting-started.md
  - Архитектура: guide/architecture.md
  - Блоки:
      - Обзор: blocks/overview.md
      - События: blocks/events.md
      - Движение: blocks/motion.md
      - Внешний вид: blocks/looks.md
      - Управление: blocks/control.md
      - Датчики: blocks/sensing.md
      - Операторы: blocks/operators.md
      - Переменные: blocks/variables.md
      - Перо: blocks/pen.md
      - Значения: blocks/literals.md
  - Рантайм:
      - Компилятор: runtime/compiler.md
      - Интерпретатор: runtime/interpreter.md
      - Движок: runtime/engine.md
      - AST: runtime/ast.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/user/polar
